services:
  api-nestjs:
    build:
      context: .
      dockerfile: apps/api-nestjs/Dockerfile
    container_name: monorepo_api-nestjs
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}

  api-express:
    build:
      context: .
      dockerfile: apps/api-express/Dockerfile
    container_name: monorepo_api_express
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      NODE_ENV: ${NODE_ENV:-production}

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: monorepo_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
